<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Çin'den İthalat — 30 Saniyede Başvuru | İthalatPro</title>
  <meta name="description" content="3 kısa soru: Çin'den ürün tedariki için size özel ücretsiz Google Meet görüşmesi planlayalım." />
  <link rel="stylesheet" href="assets/css/style.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📦</text></svg>" />
</head>
<body>
  <header class="nav">
    <div class="container">
      <a class="brand" href="index.html">
        <span class="logo">İP</span>
        <span>İthalat<span style="color:var(--green)">Pro</span></span>
      </a>
    </div>
  </header>

  <section class="section">
    <div class="container" style="max-width:620px">
      <span class="eyebrow">Çin'den Mal Tedariki</span>
      <h2 style="margin-bottom:4px">30 saniyede başlayın</h2>
      <p class="sub">3 kısa soru; ardından size özel ücretsiz Google Meet görüşmesi planlayalım.</p>
      <div class="card wizard">
        <div class="wiz-progress"><div class="wiz-bar" id="wiz-bar"></div></div>
        <div id="wiz-body"><!-- script doldurur --></div>
      </div>
    </div>
  </section>

  <div id="toast-wrap"></div>
  <script>
    (function () {
      "use strict";
      function esc(s){return String(s==null?"":s).replace(/[&<>"']/g,function(c){return ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"})[c];});}

      var STEPS = [
        {
          key: "sektor", tag: "Soru 1 / 3", title: "Hangi sektörde ithalat düşünüyorsunuz?",
          items: [
            { ico: "🏠", label: "Ev & Yaşam" },
            { ico: "💡", label: "Elektronik" },
            { ico: "👕", label: "Tekstil & Giyim" },
            { ico: "💄", label: "Kozmetik & Kişisel Bakım" },
            { ico: "🧸", label: "Oyuncak & Hobi" },
            { ico: "📦", label: "Diğer" }
          ]
        },
        {
          key: "konteyner", tag: "Soru 2 / 3", title: "Ne kadar mal düşünüyorsunuz?",
          items: [
            { ico: "📦", label: "20'lik konteyner", value: "20'lik" },
            { ico: "🗃️", label: "40'lık konteyner", value: "40'lık" }
          ]
        },
        {
          key: "gecmis", tag: "Soru 3 / 3", title: "Daha önce Çin'den ithalat yaptınız mı?",
          items: [
            { ico: "✅", label: "Evet, yaptım", value: "Evet" },
            { ico: "🆕", label: "Hayır, ilk kez", value: "Hayır" }
          ]
        }
      ];

      var answers = {};
      var step = 0;
      var body = document.getElementById("wiz-body");
      function setBar(){ var b=document.getElementById("wiz-bar"); if(b) b.style.width = Math.round((step/STEPS.length)*100) + "%"; }

      function render(){
        setBar();
        var s = STEPS[step];
        var html = '<div class="wiz-step">' +
          '<span class="badge badge--green">' + esc(s.tag) + '</span>' +
          '<h3>' + esc(s.title) + '</h3>' +
          '<div class="opts">' +
          s.items.map(function(it,i){
            return '<button class="opt" data-i="' + i + '"><span class="opt-ico">' + it.ico + '</span>' +
              esc(it.label) + '<span class="opt-arrow">›</span></button>';
          }).join("") +
          '</div>' +
          (step > 0 ? '<div class="wiz-nav"><button class="btn wiz-back" id="w-back">← Geri</button><span></span></div>' : '') +
          '</div>';
        body.innerHTML = html;
        body.querySelectorAll("[data-i]").forEach(function(el){
          el.addEventListener("click", function(){
            var it = s.items[+el.getAttribute("data-i")];
            answers[s.key] = (it.value != null ? it.value : it.label);
            if (step < STEPS.length - 1) { step++; render(); }
            else finish();
          });
        });
        var bk = document.getElementById("w-back");
        if (bk) bk.addEventListener("click", function(){ step--; render(); });
      }

      function finish(){
        setBar();
        body.innerHTML =
          '<div class="wiz-step" style="text-align:center">' +
            '<div class="big-icon" style="font-size:2.6rem">✅</div>' +
            '<h3>Harika! Son adım…</h3>' +
            '<p class="muted" style="margin:8px auto 0; max-width:420px">İletişim bilgilerinizi alıp size uygun bir Google Meet görüşmesi planlayalım.</p>' +
          '</div>';
        var params = new URLSearchParams();
        if (answers.sektor) params.set("sektor", answers.sektor);
        if (answers.konteyner) params.set("konteyner", answers.konteyner);
        if (answers.gecmis) params.set("gecmis", answers.gecmis);
        // mevcut UTM/Meta parametrelerini de taşı (reklam takibi)
        var inUrl = new URLSearchParams(location.search);
        inUrl.forEach(function(v,k){ if(/^utm_|^fbclid$/i.test(k)) params.set(k, v); });
        setTimeout(function(){
          window.location.href = "index.html?" + params.toString() + "#basvuru";
        }, 700);
      }

      document.getElementById("wiz-bar").style.width = "0%";
      render();
    })();
  </script>
</body>
</html>
