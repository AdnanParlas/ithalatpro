<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Çin'den İthalat — 30 Saniyede Başvuru | İthalatPro</title>
  <meta name="description" content="3 kısa soru: Çin'den ürün tedariki için size özel ücretsiz Google Meet görüşmesi planlayalım." />
  <link rel="stylesheet" href="assets/css/style.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📦</text></svg>" />
</head>
<body>
  <header class="nav">
    <div class="container">
      <a class="brand" href="index.html">
        <span class="logo">İP</span>
        <span>İthalat<span style="color:var(--green)">Pro</span></span>
      </a>
    </div>
  </header>

  <section class="section">
    <div class="container" style="max-width:620px">
      <span class="eyebrow">Çin'den Mal Tedariki</span>
      <h2 style="margin-bottom:4px">30 saniyede başlayın</h2>
      <p class="sub">3 kısa soru; ardından size özel ücretsiz Google Meet görüşmesi planlayalım.</p>
      <div class="card wizard">
        <div class="wiz-progress"><div class="wiz-bar" id="wiz-bar"></div></div>
        <div id="wiz-body"><!-- script doldurur --></div>
      </div>
    </div>
  </section>

  <div id="toast-wrap"></div>
  <script>
    (function () {
      "use strict";
      function esc(s){return String(s==null?"":s).replace(/[&<>"']/g,function(c){return ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"})[c];});}

      var STEPS = [
        {
          key: "butce", tag: "Soru 1 / 3", title: "Aylık ithalat bütçeniz nedir?",
          sub: "Size en uygun tedarik planını sunabilmemiz için.",
          items: [
            { ico: "💵", label: "5.000 $",            value: "5.000$",   ok: false },
            { ico: "💵", label: "10.000 $",           value: "10.000$",  ok: false },
            { ico: "💰", label: "20.000 $",           value: "20.000$",  ok: true  },
            { ico: "💎", label: "20.000 $ ve üzeri",  value: "20.000$+", ok: true  }
          ]
        },
        {
          key: "gecmis", tag: "Soru 2 / 3", title: "Daha önce hiç ithalat yaptınız mı?",
          items: [
            { ico: "✅", label: "Evet, yaptım", value: "Evet" },
            { ico: "🆕", label: "Hayır, ilk kez", value: "Hayır" }
          ]
        },
        {
          key: "zaman", tag: "Soru 3 / 3", title: "Ne zaman yapmayı düşünüyorsunuz?",
          items: [
            { ico: "⚡", label: "Hemen / en kısa sürede", value: "Hemen" },
            { ico: "📅", label: "1 ay içinde", value: "1 ay içinde" },
            { ico: "🗓️", label: "1-3 ay içinde", value: "1-3 ay içinde" },
            { ico: "🔎", label: "Henüz araştırıyorum", value: "Araştırıyor" }
          ]
        }
      ];

      var answers = {};
      var step = 0;
      var body = document.getElementById("wiz-body");
      function setBar(pct){ var b=document.getElementById("wiz-bar"); if(b) b.style.width = (pct!=null?pct:Math.round((step/STEPS.length)*100)) + "%"; }

      function render(){
        setBar();
        var s = STEPS[step];
        var html = '<div class="wiz-step">' +
          '<span class="badge badge--green">' + esc(s.tag) + '</span>' +
          '<h3>' + esc(s.title) + '</h3>' +
          (s.sub ? '<p class="muted">' + esc(s.sub) + '</p>' : '') +
          '<div class="opts">' +
          s.items.map(function(it,i){
            return '<button class="opt" data-i="' + i + '"><span class="opt-ico">' + it.ico + '</span>' +
              esc(it.label) + '<span class="opt-arrow">›</span></button>';
          }).join("") +
          '</div>' +
          (step > 0 ? '<div class="wiz-nav"><button class="btn wiz-back" id="w-back">← Geri</button><span></span></div>' : '') +
          '</div>';
        body.innerHTML = html;
        body.querySelectorAll("[data-i]").forEach(function(el){
          el.addEventListener("click", function(){
            var it = s.items[+el.getAttribute("data-i")];
            answers[s.key] = (it.value != null ? it.value : it.label);
            // Bütçe elemesi: 20.000$ altı → siteye giremez
            if (s.key === "butce" && it.ok === false) { renderBlocked(); return; }
            if (step < STEPS.length - 1) { step++; render(); }
            else finish();
          });
        });
        var bk = document.getElementById("w-back");
        if (bk) bk.addEventListener("click", function(){ step--; render(); });
      }

      function renderBlocked(){
        setBar(100);
        body.innerHTML =
          '<div class="wiz-step" style="text-align:center">' +
            '<div class="big-icon" style="font-size:2.8rem">🚫</div>' +
            '<h3>Şu an için uygun değil</h3>' +
            '<p class="muted" style="max-width:420px; margin:8px auto 0">Hizmetimiz aylık <strong>20.000 $ ve üzeri</strong> ithalat bütçesi olan işletmelere yöneliktir. Bütçeniz bu seviyeye geldiğinde sizi tekrar bekleriz.</p>' +
            '<button class="btn btn--ghost" id="w-restart" style="margin-top:20px">← Baştan başla</button>' +
          '</div>';
        document.getElementById("w-restart").addEventListener("click", function(){
          answers = {}; step = 0; render();
        });
      }

      function finish(){
        setBar(100);
        body.innerHTML =
          '<div class="wiz-step" style="text-align:center">' +
            '<div class="big-icon" style="font-size:2.6rem">✅</div>' +
            '<h3>Harika! Son adım…</h3>' +
            '<p class="muted" style="margin:8px auto 0; max-width:420px">İletişim bilgilerinizi alıp size uygun bir Google Meet görüşmesi planlayalım.</p>' +
          '</div>';
        var params = new URLSearchParams();
        if (answers.butce) params.set("butce", answers.butce);
        if (answers.gecmis) params.set("gecmis", answers.gecmis);
        if (answers.zaman) params.set("zaman", answers.zaman);
        // mevcut UTM/Meta parametrelerini de taşı (reklam takibi)
        var inUrl = new URLSearchParams(location.search);
        inUrl.forEach(function(v,k){ if(/^utm_|^fbclid$/i.test(k)) params.set(k, v); });
        setTimeout(function(){
          window.location.href = "index.html?" + params.toString() + "#basvuru";
        }, 700);
      }

      render();
    })();
  </script>
</body>
</html>
